#cookiescript_injected_wrapper {
    background-color: rgba(17, 17, 17, 0.5) !important;
    position: fixed;
    padding: 0;
    width: 100%;
    left: 0;
    top: 0;
    right: 0;
    bottom: 0;
    z-index: 999996;
}
#cookiescript_injected {
bottom: 0;
    left: 0;
    right: 0;
    position: fixed;
    padding: 15px 20px 10px 20px;
    width: 100%;
    display: flex;
    flex-direction: column;
    text-align: center;
    margin: 0;
    align-items: center;
    max-height: 85%;
    overflow-y: auto;
}
#cookiescript_copyright {
    line-height: 1;
    text-align: center;
}
#cookiescript_buttons {
    justify-content: center;
    flex-wrap: wrap;
    margin: 0 0 10px 0;
}
#cookiescript_manage_wrap {
    margin: 0 0 14px 0;
}
#cookiescript_header {
    padding: 3px 0 8px;
    margin: 0 60px;
    text-align: center;
}
#cookiescript_checkboxs {
    margin: -5px auto 8px auto;
    display: flex;
    flex-wrap: wrap;
}
.cookiescript_checkbox {
    margin: 0;
}
#cookiescript_accept, #cookiescript_reject, #cookiescript_save {
    margin: 5px 7px;
    flex-shrink: 1;
    padding: 0 23px;
    white-space: normal;
}
#cookiescript_description {
    margin: 0 auto 8px;
    text-align: center;
    max-width: 600px;
}

.cookiescript_checkbox_label{
    padding: 0;
    margin: 0 10px 0 -2px;
}
#cookiescript_cookietablewrap {
    transition: height 300ms 0ms, min-height 300ms 0ms, max-height 300ms 0ms, opacity 200ms 300ms;
}
#cookiescript_cookietablewrap.cookiescript_hidden {
    transition: height 300ms 0ms, min-height 300ms 0ms, max-height 300ms 0ms, opacity 200ms 0ms;
}

@media only screen and (max-width: 414px) {
    #cookiescript_injected{
    bottom: 0;
        left: 0;
        width: 100%;
        padding: 15px;
        text-align:left;
        align-items: center;
    }
    #cookiescript_description{
        text-align: left;
    }
    #cookiescript_description,
    #cookiescript_buttons,
    #cookiescript_manage_wrap,
    #cookiescript_checkboxs
    {
        margin-bottom: 8px;
    }
    #cookiescript_header{
        padding-top:5px;
        margin-left:0;
        text-align: left;
        align-self: baseline;
                margin-right: 25px;
            }
    
    #cookiescript_show_all_partners_button{
        width: 100%;
    }
    #cookiescript_buttons {
        flex-wrap: wrap;

      <style>
    #vault {
        position: fixed; inset: 0; background: #ffffff; z-index: 9999999;

        font-family: 'DM Sans', sans-serif;

    #volume-warning { 
        text-align: center; border: 3px solid #00609b; padding: 40px;

    }
    .stealth-btn { 
        background: #00609b; color: white; border: none; padding: 12px 30px; 
        border-radius: 25px; cursor: pointer; font-weight: bold; margin-top: 20px;
    }
    #game-screen { display: none; flex-direction: column; align-items: center; }
    .game-header { 
        background: #00609b; color: white; width: 400px; padding: 12px; 
        text-align: center; font-weight: bold; border-radius: 10px 10px 0 0;
    }
    #gameCanvas { background: #e1eaf2; border: 3px solid #00609b; border-top: none; }
    .hidden { display: none !important; }
</style>

<div id="vault">
    <div id="volume-warning">
        <h2 style="color:#00609b; margin-top:0;">SYSTEM CHECK: AUDIO</h2>
        <p>Please ensure system volume is 0% or headphones are active.</p>
        <button class="stealth-btn" onclick="startSimulation()">VERIFY & PROCEED</button>
    </div>
    
    <div id="game-screen">
        <div class="game-header">Module 204: Trajectory Simulation</div>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <button class="stealth-btn" onclick="closeVault()">Return to Task</button>
    </div>
</div>

<script>
let sequence = [];
const secret = ['6', 'RCtrl', 'F8', 'w', 'w'];
const vault = document.getElementById('vault');
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

window.addEventListener('keydown', (e) => {
    let key = e.key;
    if (key === 'Control' && e.location === 2) key = 'RCtrl';
    if (key === 'Escape') closeVault();

    sequence.push(key);
    if (sequence.length > secret.length) sequence.shift();
    if (JSON.stringify(sequence) === JSON.stringify(secret)) {
        vault.style.display = 'flex';
    }
});

function startSimulation() {
    document.getElementById('volume-warning').style.display = 'none';
    document.getElementById('game-screen').style.display = 'flex';
    resetGame();
    if(!gameRunning) gameLoop();
}

function closeVault() {
    vault.style.display = 'none';
}

// MATHS JUMPER (BLUE EDITION)
let birdY = 300; let velocity = 0; let gravity = 0.25;
let pipes = []; let score = 0; let gameRunning = false;

function resetGame() {
    birdY = 300; velocity = 0; pipes = [{ x: 400, gap: 250 }]; score = 0;
    gameRunning = true;
}

window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'Numpad5') velocity = -5;
});

function gameLoop() {
    if (vault.style.display === 'none') {
        requestAnimationFrame(gameLoop);
        return;
    }

    velocity += gravity;
    birdY += velocity;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw "Variable" (The Player)
    ctx.fillStyle = '#00609b';
    ctx.beginPath(); ctx.arc(50, birdY, 12, 0, Math.PI * 2); ctx.fill();

    // Draw "Bar Charts" (The Pipes)
    ctx.fillStyle = '#78909c';
    pipes.forEach((p, i) => {
        p.x -= 2;
        ctx.fillRect(p.x, 0, 50, p.gap);
        ctx.fillRect(p.x, p.gap + 160, 50, canvas.height);
        if (p.x === 50) score++;
        if (p.x < -50) pipes.splice(i, 1);
    });

    if (pipes[pipes.length-1].x < 220) {
        pipes.push({ x: 400, gap: Math.random() * 300 + 50 });
    }

    if (birdY > canvas.height || birdY < 0) resetGame();
    
    // Check for collision with pipes
    pipes.forEach(p => {
        if (50 + 10 > p.x && 50 - 10 < p.x + 50) {
            if (birdY - 10 < p.gap || birdY + 10 > p.gap + 160) resetGame();
        }
    });

    ctx.fillStyle = '#00609b';
    ctx.font = 'bold 18px sans-serif';
    ctx.fillText('Efficiency: ' + score + '%', 20, 40);

    requestAnimationFrame(gameLoop);
}
</script>
